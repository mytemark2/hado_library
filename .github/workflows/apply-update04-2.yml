name: Apply app 3.0.0.0 Update04.2

on:
  workflow_dispatch:
  push:
    branches:
      - feature/app-3.0.0.0
    paths:
      - ".github/workflows/apply-update04-2.yml"
      - "tools/apply_update04_2.py"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/app-3.0.0.0
      - name: Apply Update04.2 vaccine type and zero-match exclusion
        shell: bash
        run: |
          set -euo pipefail
          python tools/apply_update04_2.py
          python -m json.tool HADO_DEV_INFO.json >/dev/null
          python -m json.tool hadou_type_score_rules.json >/dev/null
          python -m json.tool hadou_type_purpose_rules.json >/dev/null
          python -m json.tool report/HADO_APP_3.0.0.0_UPDATE04.2_REPORT.json >/dev/null
          node --check src/update04_type_candidates.js
          grep -q 'Update04.2' src/update04_type_candidates.js
          grep -q '参考一致数が0件の候補は表示しません。' src/update04_type_candidates.js
          grep -q 'v._s.matched.length>0' src/update04_type_candidates.js
          grep -q 'typeId":"vaccine"' hadou_type_score_rules.json
          grep -q 'HADO_UPDATE04_START' index.html
          cmp --silent index.html hado_library_3.0.0.0.html
      - name: Commit Update04.2
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/update04_type_candidates.js tools/apply_update04_2.py .github/workflows/apply-update04-2.yml index.html hado_library_3.0.0.0.html HADO_DEV_INFO.json hadou_type_score_rules.json hadou_type_purpose_rules.json report/HADO_APP_3.0.0.0_UPDATE04.2_REPORT.json
          if ! git diff --cached --quiet; then
            git commit -m "feat: add vaccine type and zero-match exclusion for Update04.2"
            git push origin HEAD:feature/app-3.0.0.0
          fi
      - name: Dispatch final preview sync
        shell: bash
        env:
          PREVIEW_REPO_TOKEN: ${{ secrets.PREVIEW_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${PREVIEW_REPO_TOKEN:-}" ]; then
            echo "PREVIEW_REPO_TOKEN is not configured."
            exit 1
          fi
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${PREVIEW_REPO_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/mytemark2/hado_library-preview/dispatches \
            --data '{"event_type":"sync_app_preview"}'
