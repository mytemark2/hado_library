name: Apply app Update05 candidate tray

on:
  push:
    branches:
      - feature/app-3.0.0.0
    paths:
      - "tools/apply_update05.py"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/app-3.0.0.0

      - name: Apply Update05
        shell: bash
        run: |
          set -euo pipefail
          python tools/apply_update05.py
          cmp --silent index.html hado_library_3.0.0.0.html
          python -m json.tool HADO_DEV_INFO.json >/dev/null
          python -m json.tool report/HADO_APP_3.0.0.0_UPDATE05_REPORT.json >/dev/null
          node --check src/update04_type_candidates.js
          node --check src/update05_candidate_tray.js

      - name: Commit Update05
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "feat: add Update05 candidate tray with existing-gate handoff"
            git push origin HEAD:feature/app-3.0.0.0
          fi

      - name: Dispatch preview sync
        shell: bash
        env:
          PREVIEW_REPO_TOKEN: ${{ secrets.PREVIEW_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${PREVIEW_REPO_TOKEN:-}" ]; then
            echo "PREVIEW_REPO_TOKEN is not configured; skip preview dispatch."
            exit 0
          fi
          curl --fail-with-body --silent --show-error \
            --request POST \
            --header "Accept: application/vnd.github+json" \
            --header "Authorization: Bearer ${PREVIEW_REPO_TOKEN}" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/mytemark2/hado_library-preview/dispatches \
            --data '{"event_type":"sync_app_preview"}'
