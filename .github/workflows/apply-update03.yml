name: Apply app 3.0.0.0 Update03

on:
  workflow_dispatch:
  push:
    branches:
      - feature/app-3.0.0.0
    paths:
      - ".github/workflows/apply-update03.yml"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/app-3.0.0.0

      - name: Inject Update03 into HTML
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path
          import base64,gzip,json,re,hashlib
          start='<!-- HADO_UPDATE03_START -->'
          end='<!-- HADO_UPDATE03_END -->'
          js=gzip.decompress(base64.b64decode('')).decode('utf-8')
          block=start+'<script>\n'+js+'\n</script>'+end
          for p in [Path('index.html'),Path('hado_library_3.0.0.0.html')]:
              if not p.exists():
                  continue
              s=p.read_text(encoding='utf-8')
              s=re.sub(re.escape(start)+r'.*?'+re.escape(end),'',s,flags=re.S)
              if '</body>' not in s:
                  raise SystemExit(f'</body> not found: {p}')
              p.write_text(s.replace('</body>',block+'</body>',1),encoding='utf-8')
          info=Path('HADO_DEV_INFO.json')
          data=json.loads(info.read_text(encoding='utf-8'))
          data.update({
              'releaseStatus':'development',
              'releaseVersion':'3.0.0.0',
              'updateNo':'03',
              'revision':0,
              'displayVersion':'3.0.0.0 Update03.0',
              'summary':'Update03.0: add three type-formation entry flows: main general, purpose, and direct type selection.',
              'updatedAt':'2026-06-06T00:00:00+09:00'
          })
          info.write_text(json.dumps(data,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          report={
              'version':'3.0.0.0',
              'update':'Update03.0',
              'features':['主将から考える','目的から考える','型を直接選ぶ'],
              'mainGeneralOrder':'crawler JSON sourceIndex ascending',
              'purposeRuleSource':'hadou_type_purpose_rules.json',
              'typePresetSource':'hadou_type_search_presets.json',
              'selectionStorageKey':'hado.typeEntry.selection.v1',
              'eventName':'hado:type-search-entry-selected',
              'indexSha256':hashlib.sha256(Path('index.html').read_bytes()).hexdigest()
          }
          Path('report').mkdir(exist_ok=True)
          Path('report/HADO_APP_3.0.0.0_UPDATE03_REPORT.json').write_text(json.dumps(report,ensure_ascii=False,indent=2)+'\n',encoding='utf-8')
          PY
          python -m json.tool HADO_DEV_INFO.json >/dev/null
          python -m json.tool report/HADO_APP_3.0.0.0_UPDATE03_REPORT.json >/dev/null
          grep -q 'HADO_UPDATE03_START' index.html
          grep -q '主将から考える' index.html
          grep -q '目的から考える' index.html
          grep -q '型を直接選ぶ' index.html

      - name: Commit Update03
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html hado_library_3.0.0.0.html HADO_DEV_INFO.json report/HADO_APP_3.0.0.0_UPDATE03_REPORT.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "feat: add type formation entry navigator for app Update03.0"
          git push origin HEAD:feature/app-3.0.0.0
