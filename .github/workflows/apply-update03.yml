name: Apply app 3.0.0.0 Update03

on:
  workflow_dispatch:
  push:
    branches:
      - feature/app-3.0.0.0
    paths:
      - ".github/workflows/apply-update03.yml"
      - "src/update03_type_entry.js"
      - "tools/apply_update03_4.py"

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: feature/app-3.0.0.0

      - name: Apply Update03.4 sequential wizard navigator
        shell: bash
        run: |
          set -euo pipefail
          python tools/apply_update03_4.py
          node --check src/update03_type_entry.js
          python -m py_compile tools/apply_update03_4.py
          python -m json.tool HADO_DEV_INFO.json >/dev/null
          python -m json.tool report/HADO_APP_3.0.0.0_UPDATE03.4_REPORT.json >/dev/null
          grep -q 'HADO_UPDATE03_START' index.html
          grep -q 'Update03.4' index.html
          grep -q 'WIZARD_STEPS' index.html
          grep -q 'compositionstart' index.html
          grep -q 'compositionend' index.html
          grep -q 'IME変換中は候補DOMを作り直さず、変換確定後に表示・非表示だけを切り替えます。' index.html
          ! grep -q 'state.query = e.target.value; render();' index.html
          cmp --silent index.html hado_library_3.0.0.0.html

      - name: Commit Update03.4
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/update03_type_entry.js index.html hado_library_3.0.0.0.html HADO_DEV_INFO.json report/HADO_APP_3.0.0.0_UPDATE03.4_REPORT.json
          if git diff --cached --quiet; then exit 0; fi
          git commit -m "feat: convert type navigator to sequential wizard for Update03.4"
          git push origin HEAD:feature/app-3.0.0.0
