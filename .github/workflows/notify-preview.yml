name: Notify Hado Library Preview

on:
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  notify-preview:
    if: ${{ github.event.deleted == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Resolve app branch
        id: source
        shell: bash
        run: |
          set -euo pipefail
          APP_REF="${GITHUB_REF_NAME}"
          if [ -z "${APP_REF}" ]; then
            echo "Source branch name could not be resolved." >&2
            exit 1
          fi
          echo "app_ref=${APP_REF}" >> "${GITHUB_OUTPUT}"
          echo "Preview source branch: ${APP_REF}"
          echo "Preview source commit: ${GITHUB_SHA}"

      - name: Read source display version
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          display_version="$(python - <<'PY'
          import re
          from pathlib import Path
          source = Path('hado_version.js').read_text(encoding='utf-8')
          release = re.search(r"releaseVersion:\s*'([^']+)'", source)
          update = re.search(r"updateNo:\s*'([^']+)'", source)
          if not release or not update:
              raise SystemExit('releaseVersion/updateNo not found in hado_version.js')
          print(f"{release.group(1)} Update{update.group(1)}")
          PY
          )"
          if [ -z "${display_version}" ]; then
            echo "displayVersion could not be resolved from hado_version.js" >&2
            exit 1
          fi
          echo "display_version=${display_version}" >> "${GITHUB_OUTPUT}"
          echo "Source display version: ${display_version}"

      - name: Validate source preview assets before sync
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          from pathlib import Path

          required_files = ['index.html', 'hado_library_3.0.0.0.html', 'hado_styles.css', 'hado_version.js']
          for name in required_files:
              path = Path(name)
              if not path.is_file():
                  raise SystemExit(f'Required preview source asset missing: {name}')
          index = Path('index.html').read_text(encoding='utf-8')
          css = Path('hado_styles.css').read_text(encoding='utf-8')
          if './hado_styles.css' not in index:
              raise SystemExit('index.html does not reference ./hado_styles.css')
          if './hado_version.js' not in index:
              raise SystemExit('index.html does not reference ./hado_version.js')
          if len(css) < 100000:
              raise SystemExit(f'hado_styles.css is unexpectedly small: {len(css)} bytes')
          for snippet in (':root{', '.panel{', '.app{'):
              if snippet not in css:
                  raise SystemExit(f'hado_styles.css missing required snippet: {snippet}')
          print(f'Source preview assets validated: hado_styles.css {len(css)} bytes')
          PY

      - name: Require preview repository token
        shell: bash
        env:
          PREVIEW_REPO_TOKEN: ${{ secrets.PREVIEW_REPO_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "${PREVIEW_REPO_TOKEN}" ]; then
            echo "Repository secret PREVIEW_REPO_TOKEN is missing." >&2
            echo "Create a fine-grained token with access to mytemark2/hado_library-preview and permissions Contents: Read and write and Actions: Read and write, then register it as PREVIEW_REPO_TOKEN in mytemark2/hado_library." >&2
            exit 1
          fi

      - name: Verify preview Pages deployment workflow exists
        shell: bash
        env:
          PREVIEW_REPO_TOKEN: ${{ secrets.PREVIEW_REPO_TOKEN }}
        run: |
          set -euo pipefail
          python - <<'PY'
          import base64
          import json
          import os
          import sys
          import urllib.request

          token = os.environ['PREVIEW_REPO_TOKEN']
          url = 'https://api.github.com/repos/mytemark2/hado_library-preview/contents/.github/workflows/jekyll-gh-pages.yml?ref=main'
          req = urllib.request.Request(url, headers={
              'Accept': 'application/vnd.github+json',
              'Authorization': f'Bearer {token}',
              'X-GitHub-Api-Version': '2022-11-28',
          })
          try:
              with urllib.request.urlopen(req, timeout=20) as res:
                  payload = json.loads(res.read().decode('utf-8'))
          except Exception as exc:  # noqa: BLE001 - workflow diagnostic
              print(f'Failed to read preview Pages workflow: {exc}', file=sys.stderr)
              sys.exit(1)
          content = base64.b64decode(payload.get('content', '')).decode('utf-8', errors='replace')
          required = ('actions/deploy-pages', 'actions/jekyll-build-pages', 'push:', 'branches:', 'workflow_' + 'dispatch:')
          missing = [item for item in required if item not in content]
          if missing:
              print('Preview Pages workflow is missing required entries: ' + ', '.join(missing), file=sys.stderr)
              sys.exit(1)
          print('Preview Pages workflow exists and contains deploy-pages/Jekyll build steps.')
          PY

      - name: Sync preview repository contents
        id: sync
        shell: bash
        env:
          PREVIEW_REPO_TOKEN: ${{ secrets.PREVIEW_REPO_TOKEN }}
          APP_REF: ${{ steps.source.outputs.app_ref }}
          DISPLAY_VERSION: ${{ steps.meta.outputs.display_version }}
        run: |
          set -euo pipefail
          PREVIEW_DIR="$(mktemp -d)"
          trap 'rm -rf "${PREVIEW_DIR}"' EXIT

          git clone --depth 1 "https://x-access-token:${PREVIEW_REPO_TOKEN}@github.com/mytemark2/hado_library-preview.git" "${PREVIEW_DIR}"

          rsync -a --delete \
            --exclude '.git/' \
            --exclude '.github/' \
            --exclude 'docs/' \
            --exclude 'report/' \
            --exclude 'src/' \
            --exclude 'tools/' \
            ./ "${PREVIEW_DIR}/"

          touch "${PREVIEW_DIR}/.nojekyll"
          printf '%s\n' "${GITHUB_SHA}" > "${PREVIEW_DIR}/PREVIEW_SOURCE_COMMIT.txt"
          printf '%s\n' "${APP_REF}" > "${PREVIEW_DIR}/PREVIEW_SOURCE_BRANCH.txt"
          printf '%s\n' "${DISPLAY_VERSION}" > "${PREVIEW_DIR}/PREVIEW_DISPLAY_VERSION.txt"

          python - "${PREVIEW_DIR}" <<'PY'
          import sys
          from pathlib import Path

          preview = Path(sys.argv[1])
          required_files = ['index.html', 'hado_library_3.0.0.0.html', 'hado_styles.css', 'hado_version.js', 'PREVIEW_SOURCE_COMMIT.txt']
          for name in required_files:
              path = preview / name
              if not path.is_file():
                  raise SystemExit(f'Preview repository sync missing required asset: {name}')
          index = (preview / 'index.html').read_text(encoding='utf-8')
          css = (preview / 'hado_styles.css').read_text(encoding='utf-8')
          if './hado_styles.css' not in index:
              raise SystemExit('Synced preview index.html does not reference ./hado_styles.css')
          if './hado_version.js' not in index:
              raise SystemExit('Synced preview index.html does not reference ./hado_version.js')
          if len(css) < 100000:
              raise SystemExit(f'Synced hado_styles.css is unexpectedly small: {len(css)} bytes')
          for snippet in (':root{', '.panel{', '.app{'):
              if snippet not in css:
                  raise SystemExit(f'Synced hado_styles.css missing required snippet: {snippet}')
          print(f'Synced preview assets validated: hado_styles.css {len(css)} bytes')
          PY

          git -C "${PREVIEW_DIR}" config user.name "github-actions[bot]"
          git -C "${PREVIEW_DIR}" config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git -C "${PREVIEW_DIR}" add -A
          if git -C "${PREVIEW_DIR}" diff --cached --quiet; then
            echo "No preview repository changes."
            echo "changed=false" >> "${GITHUB_OUTPUT}"
          else
            git -C "${PREVIEW_DIR}" commit -m "sync preview from ${APP_REF}: ${GITHUB_SHA}"
            git -C "${PREVIEW_DIR}" push origin HEAD:main
            echo "changed=true" >> "${GITHUB_OUTPUT}"
          fi
          echo "Preview repository content is synchronized from ${APP_REF} (${GITHUB_SHA})."

      - name: Dispatch preview Pages deployment workflow
        shell: bash
        env:
          PREVIEW_REPO_TOKEN: ${{ secrets.PREVIEW_REPO_TOKEN }}
        run: |
          set -euo pipefail
          curl --fail-with-body --silent --show-error \
            --request POST \
            --url 'https://api.github.com/repos/mytemark2/hado_library-preview/actions/workflows/jekyll-gh-pages.yml/dispatches' \
            --header 'Accept: application/vnd.github+json' \
            --header "Authorization: Bearer ${PREVIEW_REPO_TOKEN}" \
            --header 'X-GitHub-Api-Version: 2022-11-28' \
            --data '{"ref":"main"}'
          echo 'Preview Pages deployment workflow dispatched for main.'

      - name: Verify preview reflects source commit and version assets
        shell: bash
        env:
          EXPECTED_DISPLAY_VERSION: ${{ steps.meta.outputs.display_version }}
          EXPECTED_SOURCE_SHA: ${{ github.sha }}
          EXPECTED_SOURCE_BRANCH: ${{ steps.source.outputs.app_ref }}
          PREVIEW_URL: https://mytemark2.github.io/hado_library-preview/
        run: |
          set -euo pipefail
          python - <<'PY'
          import os
          import re
          import sys
          import time
          import urllib.request

          expected_display = os.environ['EXPECTED_DISPLAY_VERSION']
          expected_sha = os.environ['EXPECTED_SOURCE_SHA']
          expected_branch = os.environ['EXPECTED_SOURCE_BRANCH']
          base_url = os.environ['PREVIEW_URL'].rstrip('/') + '/'

          def fetch_text(path):
              url = base_url + path
              with urllib.request.urlopen(url, timeout=20) as res:
                  return res.read().decode('utf-8', errors='replace')

          last = ''
          for attempt in range(1, 31):
              try:
                  source_sha = fetch_text('PREVIEW_SOURCE_COMMIT.txt').strip()
                  source_branch = fetch_text('PREVIEW_SOURCE_BRANCH.txt').strip()
                  version_js = fetch_text('hado_version.js')
                  index_html = fetch_text('index.html')
                  css_text = fetch_text('hado_styles.css')
                  release = re.search(r"releaseVersion:\s*'([^']+)'", version_js)
                  update = re.search(r"updateNo:\s*'([^']+)'", version_js)
                  deployed_display = f"{release.group(1)} Update{update.group(1)}" if release and update else ''
                  if (
                      source_sha == expected_sha
                      and source_branch == expected_branch
                      and deployed_display == expected_display
                      and './hado_version.js' in index_html
                      and './hado_styles.css' in index_html
                      and len(css_text) >= 100000
                      and ':root{' in css_text
                      and '.panel{' in css_text
                      and '.app{' in css_text
                  ):
                      print(f'Preview verified: {expected_display} / {expected_branch} / {expected_sha}')
                      sys.exit(0)
                  last = (
                      f'source_sha={source_sha!r}, source_branch={source_branch!r}, deployed_display={deployed_display!r}, '
                      f'index_has_version={"./hado_version.js" in index_html}, '
                      f'index_has_css={"./hado_styles.css" in index_html}, css_len={len(css_text)}'
                  )
              except Exception as exc:  # noqa: BLE001 - keep workflow diagnostics readable
                  last = repr(exc)
              print(f'Preview assets not updated yet (attempt {attempt}/30); waiting 10s... {last}')
              time.sleep(10)
          print(f'Preview did not match source commit/version: {expected_sha} / {expected_display}', file=sys.stderr)
          print(f'Last preview asset state: {last}', file=sys.stderr)
          sys.exit(1)
          PY
